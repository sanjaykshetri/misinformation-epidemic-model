name: Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Generate coverage report
        run: pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true

  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy (strict mode)
        run: mypy src/ --strict --ignore-missing-imports --no-error-summary 2>&1 | head -50 || true

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install black flake8 pylint

      - name: Check code formatting with black
        run: black --check src/ tests/ || true

      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E501,W503 || true

      - name: Security check with bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check docstring coverage
        run: |
          python -c "
          import os
          import ast
          
          def check_docstrings(filepath):
              with open(filepath) as f:
                  tree = ast.parse(f.read())
              
              funcs = [n for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
              missing = sum(1 for f in funcs if not ast.get_docstring(f))
              return len(funcs), missing
          
          total = missing_total = 0
          for root, dirs, files in os.walk('src'):
              for file in files:
                  if file.endswith('.py'):
                      path = os.path.join(root, file)
                      t, m = check_docstrings(path)
                      total += t
                      missing_total += m
              
          coverage = 100 * (1 - missing_total / max(total, 1))
          print(f'Docstring coverage: {coverage:.0f}% ({total - missing_total}/{total})')
          "
